body:
  text: 垂光集詔令奏議類二奏議之屬提要臣等謹按垂光集二卷明周璽撰璽字天章號荆山合肥人宏治丙辰進士官至禮科都給事中為劉瑾所搆斃于廷杖瑾敗後禮科給事中孫楨疏訟其枉詔復官䕃其一孫事蹟具明史本傳是集上卷載疏十三篇上于宏治朝者七上于正德朝者六言皆痛切而劾瑾二疏則尤直氣坌涌聲溢簡外明史本傳但稱其劾法王真人劾太監齊元侍郎李溫太監苖逵尚書崔志端熊翀賈斌都御史金渾徐元又應詔陳八事劾大僚賈斌等十一人太監李鼎等二人勳戚張懋等七人邉將朱廷等三人又稱其論太監韋興不當命守鄖陽及忤瑾黨楊玉不及劾瑾之事此集可補史之闕疏後附載家書一通其許國忘家之意已早决于未劾逆璫之前與盡忠録陳東八月二十五日家書詞氣相似亦可謂食其祿不避其難者矣下卷附録敕命祭文墓表碑記及題詠詩歌其中嘉靖二年諭祭文曰權奸搆禍削籍歸田抑鬱未伸遽焉淪沒似謂璽卒于歸田之後者與史載璽杖斃事狀絶不相符豈當時諱其杖死案牘所載僅以削籍為詞耶亦足見明政不綱恣為欺罔矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a8c4af903780188209a89210b7b2d21b893932a39ab3233f9fd22f08a206e2ed
